name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # 매일 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.READ_KEY }}

      - name: Generate pin - spring-osca
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=team-osca2&repo=spring-osca
          path: profile/pin-spring-osca.svg
          token: ${{ secrets.READ_KEY }}

      - name: Generate pin - BodeumMe
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=O-O-A-A&repo=BodeumMe
          path: profile/pin-bodeumme.svg
          token: ${{ secrets.READ_KEY }}

      - name: Generate pin - hs-major
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=UHeeJoon&repo=hs-major
          path: profile/pin-hs-major.svg
          token: ${{ secrets.READ_KEY }}

      - name: Generate pin - hanghae99
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=UHeeJoon&repo=hanghae99
          path: profile/pin-hanghae99.svg
          token: ${{ secrets.READ_KEY }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
